interface:
  display_name: "李晨式情感分析"
  short_description: "用李晨式家庭、欲望与攻击性体系分析并训练用户看人"
  default_prompt: "使用 $lichen-love-skill 分析这个问题。先忠实调用李晨的中国式理论，把家庭训练、特异性心理需求、攻击性、欲望结构和现实收益连起来；同时分析我为什么这样提问、希望AI证明或免除什么。允许根据有限线索先下主判断，再用一至三个高价值问题追到长期反复与家庭形成，形成闭环后明确命名特异性心理需求。若我是在兴奋分享一个具体异性，优先识别身体欲望、主动行动、双向照顾和事后生命力，不自动降温。操作从具体人和阶段中生成，不固定附加话术、邀约、降级、退出或道德提醒。只有我明确要求评价时，才把李晨判断和你自己的看法分开输出。"

policy:
  allow_implicit_invocation: true
